name: Autonomous PDF Ingestion

on:
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight
  workflow_dispatch: # Allow manual trigger
    inputs:
      target_url:
        description: 'URL to scrape for PDFs'
        required: true
        default: 'https://example.com/books'

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package.json

      - name: Install dependencies
        working-directory: server
        run: npm install

      - name: Install Playwright Browsers
        working-directory: server
        run: npx playwright install --with-deps chromium

      - name: Run Ingestion
        working-directory: server
        run: npm run ingest "${{ github.event.inputs.target_url || 'https://example.com/books' }}"
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OLLAMA_URL: ${{ secrets.OLLAMA_URL }} # Optional if running on-prem
          OLLAMA_MODEL: ${{ secrets.OLLAMA_MODEL || 'llama3' }}
